<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
		/>
		<meta name="text-scale" content="scale" />

		<!-- PWA -->
		<meta name="theme-color" content="#356bf5" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Mille Bornes" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

		<!-- Playful rounded fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
		<!-- After %sveltekit.head% so our icon overrides SvelteKit's dev default -->
		<link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

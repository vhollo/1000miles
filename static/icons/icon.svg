<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Mille Bornes">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#5b93ff" />
			<stop offset="1" stop-color="#2050e0" />
		</linearGradient>
		<linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#3a3d5c" />
			<stop offset="1" stop-color="#232542" />
		</linearGradient>
	</defs>

	<!-- full-bleed background (safe for maskable) -->
	<rect width="512" height="512" fill="url(#bg)" />

	<!-- road -->
	<path d="M170 470 L222 230 H290 L342 470 Z" fill="url(#road)" />
	<!-- centre dashes -->
	<g fill="#ffd23f">
		<rect x="251" y="250" width="10" height="34" rx="5" />
		<rect x="250" y="312" width="12" height="40" rx="6" />
		<rect x="249" y="386" width="14" height="48" rx="7" />
	</g>

	<!-- borne (kilometre milestone): white post, red domed cap -->
	<g>
		<rect x="214" y="120" width="84" height="150" rx="22" fill="#fff7ec" />
		<path d="M214 150 a42 42 0 0 1 84 0 v6 h-84 Z" fill="#ff4d5e" />
		<rect x="214" y="120" width="84" height="40" rx="20" fill="#ff4d5e" />
		<text x="256" y="232" font-family="'Baloo 2', system-ui, sans-serif" font-weight="800"
			font-size="46" fill="#2050e0" text-anchor="middle">1000</text>
	</g>
</svg>
